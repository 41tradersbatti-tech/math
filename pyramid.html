<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Square Pyramid 3D Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background-color: #f3f4f6; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }
        
        #main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            padding: 15px;
            gap: 15px;
        }

        /* Top Card for 3D Model */
        #model-card {
            width: 100%;
            max-width: 380px;
            flex: 1;
            background: white;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            border: 6px solid white;
        }

        /* Bottom Card for Controls */
        #ui-card {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            z-index: 10;
        }

        #canvas-wrapper { width: 100%; height: 100%; cursor: grab; }

        .label {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-family: serif;
            font-style: italic;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px white;
            z-index: 5;
        }

        input[type=range] { accent-color: #ff4d4d; }
    </style>
</head>
<body>

<div id="main-container">
    
    <div id="model-card">
        <div id="canvas-wrapper"></div>
        <div id="label-h" class="label text-green-600">h</div>
        <div id="label-l" class="label text-yellow-600">l</div>
        <div id="label-s" class="label text-red-600">s</div>
    </div>

    <div id="ui-card">
        <div class="text-center mb-3">
            <span class="bg-[#ff4d4d] text-white text-[9px] font-bold px-3 py-0.5 rounded-full uppercase tracking-widest">3D Geometry</span>
            <h2 class="text-3xl font-black text-[#1a1c2e] mt-1">Pyramid</h2>
        </div>

        <p class="text-center text-gray-500 text-xs mb-4">
            Slider-ai நகர்த்தி பிரமிடு எப்படி உருவாகிறது என்று பாருங்கள்.
        </p>
        
        <div class="space-y-3">
            <div class="flex justify-between text-[10px] font-black text-gray-400 uppercase">
                <span>Fold</span>
                <span>Unfold (Net)</span>
            </div>
            <input type="range" id="explodeSlider" min="0" max="1" step="0.01" value="0" class="w-full h-2 bg-gray-100 rounded-lg appearance-none cursor-pointer">
        </div>

        <div class="mt-5 flex justify-center gap-4">
            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div><span class="text-[10px] font-bold text-gray-600">Side (s)</span></div>
            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-green-500"></div><span class="text-[10px] font-bold text-gray-600">Height (h)</span></div>
            <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-yellow-500"></div><span class="text-[10px] font-bold text-gray-600">Slant (l)</span></div>
        </div>
    </div>

</div>

<script>
    let scene, camera, renderer, pyramidGroup, markersGroup;
    let faces = [];
    let isDragging = false;
    let previousPosition = { x: 0, y: 0 };
    const explodeSlider = document.getElementById('explodeSlider');
    const canvasWrapper = document.getElementById('canvas-wrapper');

    const s = 2.6; 
    const h = 2.8; 

    window.onload = function() {
        init();
        animate();
    };

    // --- SCALE/DASHED LINE FUNCTION ---
    function createDashedLine(p1, p2, color) {
        const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        const material = new THREE.LineDashedMaterial({ 
            color: color, 
            dashSize: 0.15, 
            gapSize: 0.1, 
            depthTest: false,
            linewidth: 2
        });
        const line = new THREE.Line(geometry, material);
        line.renderOrder = 999; 
        line.computeLineDistances();
        return line;
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const width = canvasWrapper.clientWidth;
        const height = canvasWrapper.clientHeight;

        camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        camera.position.set(6, 5, 9);
        camera.lookAt(0, 0.5, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        canvasWrapper.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        pyramidGroup = new THREE.Group();
        markersGroup = new THREE.Group(); // SCALES/LINES INGUTHAAN IRUKKUM
        scene.add(pyramidGroup);
        scene.add(markersGroup);

        // 1. Base
        const baseGeom = new THREE.PlaneGeometry(s, s);
        const baseMat = new THREE.MeshPhongMaterial({ color: 0xff4d4d, side: THREE.DoubleSide });
        const base = new THREE.Mesh(baseGeom, baseMat);
        base.rotation.x = -Math.PI / 2;
        pyramidGroup.add(base);

        // 2. Triangular Faces
        const triMat = new THREE.MeshPhongMaterial({ color: 0x3b82f6, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
        const apex = new THREE.Vector3(0, h, 0);
        const v = [
            new THREE.Vector3(-s/2, 0, s/2), new THREE.Vector3(s/2, 0, s/2),
            new THREE.Vector3(s/2, 0, -s/2), new THREE.Vector3(-s/2, 0, -s/2)
        ];

        [[v[0], v[1], apex], [v[1], v[2], apex], [v[2], v[3], apex], [v[3], v[0], apex]].forEach((pts, i) => {
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            geom.computeVertexNormals();
            const mesh = new THREE.Mesh(geom, triMat);
            const pivot = new THREE.Group();
            const mid = pts[0].clone().add(pts[1]).multiplyScalar(0.5);
            pivot.position.copy(mid);
            mesh.position.sub(mid);
            pivot.add(mesh);
            pyramidGroup.add(pivot);
            faces.push({ pivot: pivot });
        });

        // 3. SCALES (THE LINES) - Magic Triangle logic
        markersGroup.add(createDashedLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,h,0), 0x22c55e)); // h (Height)
        markersGroup.add(createDashedLine(new THREE.Vector3(0,h,0), new THREE.Vector3(0,0,s/2), 0xeab308)); // l (Slant Height)
        markersGroup.add(createDashedLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,s/2), 0x6b7280)); // s/2 (Base center to edge)
        markersGroup.add(createDashedLine(new THREE.Vector3(-s/2, 0.01, s/2), new THREE.Vector3(s/2, 0.01, s/2), 0xff4d4d)); // s (Full side)

        // Events
        const onStart = (x, y) => { isDragging = true; previousPosition = { x, y }; };
        const onMove = (x, y) => {
            if (isDragging) {
                const dx = (x - previousPosition.x) * 0.01;
                const dy = (y - previousPosition.y) * 0.01;
                pyramidGroup.rotation.y += dx; markersGroup.rotation.y += dx;
                pyramidGroup.rotation.x += dy; markersGroup.rotation.x += dy;
                previousPosition = { x, y };
            }
        };

        canvasWrapper.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        canvasWrapper.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => isDragging = false);

        window.addEventListener('resize', () => {
            camera.aspect = canvasWrapper.clientWidth / canvasWrapper.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvasWrapper.clientWidth, canvasWrapper.clientHeight);
        });
    }

    function updateLabel(id, worldPos) {
        const div = document.getElementById(id);
        const vector = worldPos.clone();
        vector.applyEuler(markersGroup.rotation);
        vector.project(camera);
        const x = (vector.x * 0.5 + 0.5) * canvasWrapper.clientWidth;
        const y = (-(vector.y * 0.5) + 0.5) * canvasWrapper.clientHeight;
        div.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px)`;
    }

    function animate() {
        requestAnimationFrame(animate);
        const factor = explodeSlider.value;
        faces.forEach((f, i) => {
            const angle = (Math.PI / 2.1) * factor;
            if (i === 0) f.pivot.rotation.x = angle;
            if (i === 1) f.pivot.rotation.z = -angle;
            if (i === 2) f.pivot.rotation.x = -angle;
            if (i === 3) f.pivot.rotation.z = angle;
        });

        // Update Label positions based on actual points
        updateLabel('label-h', new THREE.Vector3(0.3, h/2, 0));
        updateLabel('label-l', new THREE.Vector3(0.3, h/2, s/4));
        updateLabel('label-s', new THREE.Vector3(0, -0.3, s/2 + 0.2));

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
